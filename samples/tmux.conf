# Tmux sample — comprehensive feature coverage.
# Highlights: constants/numerics (green).

set-option -g default-terminal "tmux-256color"
set-option -g history-limit 5000
set-option -g status-keys vi
set-option -g mouse on
set-option -g status-bg "#222822"
set-option -g status-fg "#e8d5b7"
set-window-option -g mode-keys vi
set-window-option -g automatic-rename on

bind-key r source-file ~/.tmux.conf \; display "Reloaded"
bind-key -n M-Left previous-window
bind-key -n M-Right next-window

new-session -d -s ravenwood
new-window -t ravenwood:1 -n editor
select-window -t ravenwood:1