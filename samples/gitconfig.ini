# Git/INI sample — comprehensive feature coverage.
# Highlights: group titles/entities (red), key-value sep (orange), strings (green), definitions (aqua).

[core]
    repositoryformatversion = 0
    filemode = true
    bare = false
    logallrefupdates = true

[remote "origin"]
    url = https://github.com/raythurman2386/ravenwood-vscode.git
    fetch = +refs/heads/*:refs/remotes/origin/*

[branch "main"]
    remote = origin
    merge = refs/heads/main

[user]
    name = raythurman2386
    email = support@raythurman.dev

[init]
    defaultBranch = main

[alias]
    co = checkout
    st = status
    br = branch