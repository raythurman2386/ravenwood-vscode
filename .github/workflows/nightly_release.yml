name: Nightly Release

on:
  schedule:
    # 2:00 AM UTC every day (9:00 PM CT)
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  nightly-release:
    runs-on: ubuntu-latest
    if: github.repository == 'raythurman2386/ravenwood-vscode'

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get last tag and current version
        id: last
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "$LAST_TAG" ]; then
            COMMIT_COUNT=$(git rev-list "$LAST_TAG"..HEAD --count)
          else
            COMMIT_COUNT=$(git rev-list HEAD --count)
          fi
          echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
          echo "Last tag: $LAST_TAG"
          echo "Current version: $CURRENT_VERSION"
          echo "Commits since last tag: $COMMIT_COUNT"

      - name: Skip if no new commits
        if: steps.last.outputs.commit_count == '0'
        run: |
          echo "No new commits since last tag (${{ steps.last.outputs.last_tag }}). Skipping release."
          exit 0

      - name: Bump patch version
        id: bump
        run: |
          OLD_VERSION="${{ steps.last.outputs.current_version }}"
          IFS='.' read -ra PARTS <<< "$OLD_VERSION"
          MAJOR="${PARTS[0]}"
          MINOR="${PARTS[1]}"
          PATCH="${PARTS[2]}"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $OLD_VERSION → $NEW_VERSION"
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version

      - name: Generate changelog
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          LAST_TAG: ${{ steps.last.outputs.last_tag }}
        run: |
          TODAY=$(date +%Y-%m-%d)

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG..HEAD" --format="- %s" --no-merges)
          else
            COMMITS=$(git log --format="- %s" --no-merges -20)
          fi

          ADDED=""
          CHANGED=""
          FIXED=""
          OTHER=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            msg="${line#- }"
            if echo "$msg" | grep -qiE "^[a-z]+(\([^)]*\))?: "; then
              type=$(echo "$msg" | sed -E 's/^([a-z]+)(\(.*)?:.*$/\1/')
              desc=$(echo "$msg" | sed -E 's/^[a-z]+(\([^)]*\))?: //')
              case "$type" in
                feat|add)
                  ADDED="$ADDED\n- $desc"
                  ;;
                fix)
                  FIXED="$FIXED\n- $desc"
                  ;;
                refactor|change|update|bump|build)
                  CHANGED="$CHANGED\n- $desc"
                  ;;
                *)
                  OTHER="$OTHER\n- $msg"
                  ;;
              esac
            else
              OTHER="$OTHER\n- $msg"
            fi
          done <<< "$COMMITS"

          ENTRY="## [$NEW_VERSION] - $TODAY"
          if [ -n "$ADDED" ]; then
            ENTRY="$ENTRY\n\n### Added$ADDED"
          fi
          if [ -n "$CHANGED" ]; then
            ENTRY="$ENTRY\n\n### Changed$CHANGED"
          fi
          if [ -n "$FIXED" ]; then
            ENTRY="$ENTRY\n\n### Fixed$FIXED"
          fi
          if [ -n "$OTHER" ]; then
            ENTRY="$ENTRY\n\n### Other$OTHER"
          fi

          python3 -c "
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          lines = content.split('\n')
          insert_idx = 0
          for i, line in enumerate(lines):
              if line.startswith('## ['):
                  insert_idx = i
                  break
          if insert_idx == 0:
              for i, line in enumerate(lines):
                  if line.strip() == '' and i > 2:
                      insert_idx = i
                      break
          new_entry = '''$(echo -e "$ENTRY")'''
          lines.insert(insert_idx, new_entry)
          lines.insert(insert_idx + 1, '')
          with open('CHANGELOG.md', 'w') as f:
              f.write('\n'.join(lines))
          "
          echo "Changelog updated:"
          head -30 CHANGELOG.md

      - name: Compile and verify
        run: |
          npm ci
          npm run compile
          npm run lint

      - name: Create release branch and PR
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/v$NEW_VERSION"
          git checkout -b "$BRANCH"
          git add package.json CHANGELOG.md
          git commit -m "release: v$NEW_VERSION — nightly auto-release"
          git push origin "$BRANCH"

          # Create PR
          PR_URL=$(gh pr create \
            --title "release: v$NEW_VERSION — nightly auto-release" \
            --body "Automated nightly release. Bumps version to $NEW_VERSION and updates CHANGELOG.md.

          This PR will be auto-merged and tagged to trigger stable_release.yml." \
            --head "$BRANCH" \
            --base main \
            --label automated)

          echo "PR created: $PR_URL"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Merge PR and create tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Merge the PR with admin override (bypasses status checks since enforce_admins is false)
          gh pr merge --squash --admin --delete-branch \
            --subject "release: v$NEW_VERSION — nightly auto-release (#$(gh pr list --head release/v$NEW_VERSION --json number --jq '.[0].number'))"

          # Checkout main and pull the merged changes
          git checkout main
          git pull origin main

          # Create and push the tag
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
          echo "Tagged v$NEW_VERSION and pushed. stable_release.yml will handle publishing."

      - name: Summary
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          echo "### Nightly Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** $NEW_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commits since last tag:** ${{ steps.last.outputs.commit_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Previous version:** ${{ steps.last.outputs.current_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The tag push will trigger stable_release.yml to publish to VS Code Marketplace and Open VSX." >> "$GITHUB_STEP_SUMMARY"